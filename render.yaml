# Render Blueprint for Free Claude Code
# Deploy with: render deploy -f render.yaml
# Or connect via Render Dashboard for auto-deployments
# NOTE: Render Blueprint has no field to enable submodules.
# Enable "Clone submodules" in each service's Render settings.

services:
  # Claude-compatible proxy service
  - type: web
    name: free-claude-code-anuc
    runtime: docker
    region: oregon
    plan: starter
    branch: dev
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVICE_MODE
        value: "proxy"
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: MODEL
        value: nvidia_nim/qwen/qwen3.5-122b-a10b
      - key: ANTHROPIC_AUTH_TOKEN
        value: root
      - key: CORS_ORIGINS
        value: "*"
      - key: PROVIDER_RATE_LIMIT
        value: 40
      - key: PROVIDER_MAX_CONCURRENCY
        value: 5
      - key: PROVIDER_MAX_RETRIES
        value: 3
      - key: PROVIDER_RETRY_BASE_DELAY
        value: 1
      - key: PROVIDER_RETRY_MAX_DELAY
        value: 30
      - key: PROVIDER_RETRY_JITTER
        value: 1
      - key: HTTP_READ_TIMEOUT
        value: 0
      - key: ENABLE_CAVEMAN
        value: "true"
      - key: ENABLE_THINKING
        value: "true"
      - key: FALLBACK_ROUTING
        value: "true"
      - key: HOST
        value: 0.0.0.0
      - key: LOG_FILE
        value: /app/logs/server.log
    autoDeploy: true
    disk:
      name: logs
      mountPath: /app/logs
      sizeGB: 1

  # Open WebUI service
  - type: web
    name: free-claude-code
    runtime: docker
    region: oregon
    plan: starter
    branch: dev
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVICE_MODE
        value: "webui"
      - key: ANTHROPIC_API_BASE_URL
        value: https://free-claude-code-anuc.onrender.com
      - key: ANTHROPIC_API_KEY
        value: root
      - key: OPENAI_API_BASE_URLS
        value: https://free-claude-code-anuc.onrender.com/v1
      - key: OPENAI_API_KEYS
        value: root
      - key: WEBUI_AUTH
        value: "false"
    autoDeploy: true
    disk:
      name: open-webui-data
      mountPath: /app/backend/data
      sizeGB: 1
