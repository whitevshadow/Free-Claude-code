# Render Blueprint for Free Claude Code
# Deploy with: render deploy -f render.yaml
# Or connect via Render Dashboard for auto-deployments

services:
  # Main API Service
  - type: web
    name: free-claude-code
    runtime: docker
    region: oregon  # Change to: oregon, frankfurt, singapore, etc.
    plan: starter   # starter ($7/mo) or free (with sleep)
    branch: main
    dockerfilePath: ./Dockerfile
    
    # Health check configuration
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      # === REQUIRED: Provider API Key (choose ONE) ===
      - key: NVIDIA_NIM_API_KEY
        sync: false  # Don't sync from parent service (set in dashboard)
      # - key: OPENROUTER_API_KEY
      #   sync: false
      # - key: DEEPSEEK_API_KEY
      #   sync: false
      
      # === Model Configuration ===
      - key: MODEL
        value: nvidia_nim/moonshotai/kimi-k2-instruct
      - key: MODEL_OPUS
        value: nvidia_nim/z-ai/glm-4.7
      - key: MODEL_SONNET
        value: nvidia_nim/moonshotai/kimi-k2-instruct
      - key: MODEL_HAIKU
        value: nvidia_nim/stepfun-ai/step-3.5-flash
      
      # === Security (CRITICAL for production!) ===
      - key: ANTHROPIC_AUTH_TOKEN
        generateValue: true  # Auto-generate secure token
        # Or set manually in dashboard for consistency
      
      # === CORS Configuration ===
      - key: CORS_ORIGINS
        value: "*"  # Change to your domains: https://app.com,https://api.com
      
      # === Performance Tuning ===
      - key: PROVIDER_RATE_LIMIT
        value: 40
      - key: PROVIDER_RATE_WINDOW
        value: 60
      - key: PROVIDER_MAX_CONCURRENCY
        value: 5
      - key: HTTP_READ_TIMEOUT
        value: 120
      - key: HTTP_READ_TIMEOUT_OPUS
        value: 300
      - key: HTTP_READ_TIMEOUT_SONNET
        value: 150
      - key: HTTP_READ_TIMEOUT_HAIKU
        value: 60
      
      # === Features ===
      - key: ENABLE_CAVEMAN
        value: true
      - key: ENABLE_THINKING
        value: true
      - key: FALLBACK_ROUTING
        value: true
      
      # === Server Configuration ===
      - key: HOST
        value: 0.0.0.0
      # PORT is auto-set by Render
      - key: LOG_FILE
        value: server.log
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
    # Disk for logs (optional)
    disk:
      name: logs
      mountPath: /app/logs
      sizeGB: 1

