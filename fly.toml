# Fly.io Configuration for Free Claude Code
# Deploy with: fly deploy
# Initialize: fly launch

app = "free-claude-code"
primary_region = "lax"  # Change to: lax, fra, sin, syd, etc.

# Build configuration
[build]
  # Use Dockerfile in repo root

# HTTP service configuration
[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0  # Scale to zero when idle (free tier)
  
  # Health check
  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "get"
      path = "/health"

# VM configuration
[[vm]]
  memory = '512mb'  # Increase to 1024mb for production
  cpu_kind = 'shared'
  cpus = 1

# Environment variables (non-sensitive)
[env]
  HOST = "0.0.0.0"
  PORT = "8082"
  MODEL = "nvidia_nim/moonshotai/kimi-k2-instruct"
  ENABLE_CAVEMAN = "true"
  ENABLE_THINKING = "true"
  FALLBACK_ROUTING = "true"
  PROVIDER_RATE_LIMIT = "40"
  PROVIDER_MAX_CONCURRENCY = "5"

# Set secrets with: fly secrets set KEY=value
# Required secrets:
# - NVIDIA_NIM_API_KEY (or OPENROUTER_API_KEY or DEEPSEEK_API_KEY)
# - ANTHROPIC_AUTH_TOKEN
# - CORS_ORIGINS (optional, but recommended)
